# =============================================================================
# LOCAL DEVELOPMENT DATABASE
# =============================================================================
# This runs PostgreSQL on your machine for development.
# Your production database will be hosted elsewhere (e.g., Neon).
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v  (deletes all data)
# =============================================================================

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: app_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
